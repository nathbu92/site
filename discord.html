<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discord — Nathanaël</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--acc:#5b5ef4;--acc2:#9d5cf6;--card:#111827;--bg:#080b18;--text:#f1f2f9;--muted:#8892b0;--r:1.25rem;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    header{display:flex;align-items:center;justify-content:space-between;padding:1.4rem 1.5rem;max-width:64rem;margin:0 auto;width:100%;}
    .logo-name{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;background:linear-gradient(120deg,#a5b4fc,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;}
    nav ul{display:flex;gap:1.5rem;list-style:none;}
    nav a{font-size:.88rem;font-weight:600;color:#9ca3af;text-decoration:none;transition:color .2s;}
    nav a:hover{color:#fff;}
    .nav-socials{display:flex;}
    .nav-socials a{padding:0 9px;color:#9ca3af;font-size:15px;text-decoration:none;transition:color .2s;}
    .nav-socials a:hover{color:#fff;}

    main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem;}

    .redirect-box{
      background:var(--card);border-radius:var(--r);
      border:1px solid rgba(91,94,244,.2);
      padding:3rem 2.5rem;text-align:center;
      max-width:520px;width:100%;
      position:relative;overflow:hidden;
      animation:fadeUp .5s ease both;
    }
    .redirect-box::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse at 50% 0%,rgba(91,94,244,.13),transparent 65%);
      pointer-events:none;
    }

    /* SPINNER */
    .spinner-wrap{margin-bottom:1.5rem;}
    .spinner{
      width:52px;height:52px;border-radius:50%;
      border:3px solid rgba(91,94,244,.2);
      border-top-color:var(--acc);
      animation:spin 1s linear infinite;
      margin:0 auto;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .spinner-done{display:none;}
    .spinner-done i{font-size:2.5rem;color:#22c55e;}

    .redirect-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;margin-bottom:8px;}
    .redirect-sub{font-size:.85rem;color:var(--muted);line-height:1.6;}
    .redirect-sub a{color:#a5b4fc;text-decoration:underline;cursor:pointer;}

    .redirect-bar{
      height:3px;border-radius:2px;background:rgba(91,94,244,.15);
      margin:1.5rem 0;overflow:hidden;
    }
    .redirect-bar-fill{
      height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));
      width:0%;transition:width linear;
    }

    .redirect-manual{
      margin-top:1.2rem;
      padding:10px 22px;
      background:linear-gradient(135deg,#5865f2,var(--acc2));
      border:none;border-radius:30px;color:#fff;
      font-size:.85rem;font-weight:700;cursor:pointer;
      font-family:'Inter',sans-serif;
      display:inline-flex;align-items:center;gap:8px;
      text-decoration:none;
      transition:opacity .2s,transform .15s;
    }
    .redirect-manual:hover{opacity:.88;transform:scale(.98);}

    footer{max-width:64rem;margin:0 auto;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:#4b5563;font-style:italic;border-top:1px solid rgba(91,94,244,.08);width:100%;}
    footer a{color:#6366f1;text-decoration:underline;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:560px){nav ul{display:none;}}
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo-name">Nathanaël</a>
  <nav><ul>
    <li><a href="programmes.html">Mes projets</a></li>
    <li><a href="contact.html">Me contacter</a></li>
  </ul></nav>
  <div class="nav-socials">
    <a href="https://github.com/nathbu92" target="_blank"><i class="fab fa-github"></i></a>
    <a href="#" target="_blank"><i class="fab fa-youtube"></i></a>
    <a href="#" target="_blank"><i class="fab fa-discord"></i></a>
    <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
  </div>
</header>

<main>
  <div class="redirect-box">
    <div class="spinner-wrap">
      <div class="spinner" id="spinner"></div>
      <div class="spinner-done" id="spinner-done"><i class="fas fa-check-circle"></i></div>
    </div>

    <div class="redirect-title" id="redirect-title">Redirection vers le serveur Discord...</div>
    <p class="redirect-sub" id="redirect-sub">
      Tu vas être redirigé automatiquement dans <strong id="countdown">3</strong> secondes.<br>
      Si rien ne se passe, <a id="manual-link" href="#">clique ici</a>.
    </p>

    <div class="redirect-bar">
      <div class="redirect-bar-fill" id="bar-fill"></div>
    </div>

    <a class="redirect-manual" id="btn-manual" href="#">
      <i class="fab fa-discord"></i> Rejoindre maintenant
    </a>
  </div>
</main>

<footer>
  <div>Codé avec 🫶 par Nathanaël. Tous droits réservés.</div>
  <a href="mentions-legales.html">Mentions légales</a>
</footer>

<script>
// ⚠️ Remplace cette URL par ton lien d'invitation Discord
const DISCORD_URL = 'LIEN_INVITATION_DISCORD_ICI';

document.getElementById('manual-link').href = DISCORD_URL;
document.getElementById('btn-manual').href  = DISCORD_URL;

const DELAY = 3000;
const bar   = document.getElementById('bar-fill');
const cd    = document.getElementById('countdown');

// Barre de progression
bar.style.transition = `width ${DELAY}ms linear`;
requestAnimationFrame(() => {
  requestAnimationFrame(() => { bar.style.width = '100%'; });
});

// Compte à rebours
let remaining = DELAY / 1000;
const timer = setInterval(() => {
  remaining--;
  if(remaining > 0) {
    cd.textContent = remaining;
  } else {
    clearInterval(timer);
    // Passage en état "done"
    document.getElementById('spinner').style.display    = 'none';
    document.getElementById('spinner-done').style.display = 'block';
    document.getElementById('redirect-title').textContent = 'Redirection en cours...';
    document.getElementById('redirect-sub').innerHTML =
      'Si tu n\'es pas redirigé, <a href="'+DISCORD_URL+'">clique ici</a>.';
    window.location.href = DISCORD_URL;
  }
}, 1000);
</script>
</body>
</html>
